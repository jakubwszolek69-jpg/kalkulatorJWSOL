<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalkulator PV z logo w tle</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      background-image: url('logo.png'); /* lokalny plik w tym samym folderze */
      background-repeat: no-repeat;
      background-position: right top;
      background-size: 600px 600px;
      background-attachment: fixed;
      background-color: #fff;
      color: #000;
      padding: 20px;
    }
    label {
      display: block;
      margin-top: 16px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    table {
      width: 100%;
      margin-top: 24px;
      border-collapse: collapse;
    }
    table, th, td {
      border: 1px solid #ddd;
    }
    th, td {
      padding: 12px;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <h1>Kalkulator Fotowoltaiczny (PV)</h1>
  <p>Wprowadź miesięczny rachunek za prąd, wybierz typ obiektu, miejsce montażu oraz moc instalacji.</p>

  <label>Miesięczny rachunek za prąd (zł):
    <input id="bill" type="number" placeholder="np. 300" />
  </label>

  <label>Typ obiektu:
    <select id="type">
      <option value="dom">Dom jednorodzinny</option>
      <option value="firma">Firma</option>
      <option value="gospodarstwo">Gospodarstwo rolne</option>
    </select>
  </label>

  <label>Miejsce montażu:
    <select id="mount" onchange="toggleRoofType()">
      <option value="dach">Dach</option>
      <option value="grunt">Grunt</option>
    </select>
  </label>

  <label id="roofTypeLabel">Rodzaj pokrycia dachu:
    <select id="roofType">
      <option value="blacha">Blacha</option>
      <option value="dachowka">Dachówka</option>
    </select>
  </label>

  <label>Turbina wiatrowa:
    <select id="turbine">
      <option value="0">Brak turbiny</option>
      <option value="3">3 kW</option>
      <option value="6">6 kW</option>
    </select>
  </label>

  <label>Rabat (zł) (%):
    <input id="margin" type="number" placeholder="np. 10" />
  </label>

  <label>Magazyn energii (kWh):
    <select id="battery">
      <option value="0">Brak magazynu</option>
      <option value="5">5 kWh</option>
      <option value="10">10 kWh</option>
      <option value="12">12 kWh</option>
      <option value="14">14 kWh</option>
      <option value="16">16 kWh</option>
      <option value="24">24 kWh</option>
    </select>
  </label>

  <label>
    <input type="checkbox" id="fullBackup"> Pełny backup (+1500 zł)
  </label>

  <label>Długość przekopu (m):
    <input type="number" id="trenchLength" placeholder="np. 10" />
  </label>

  <label>Wybrana moc instalacji (kW):
    <input id="power" type="number" placeholder="np. 5" />
  </label>

  <button onclick="calculate()">Oblicz</button>

  <div id="result"></div>

  <script>
    function formatCurrency(num) {
      return num.toLocaleString('pl-PL', { style: 'currency', currency: 'PLN' });
    }

    function toggleRoofType() {
      const mount = document.getElementById('mount').value;
      document.getElementById('roofTypeLabel').style.display = mount === 'dach' ? 'block' : 'none';
    }

    function calculate() {
      const bill = parseFloat(document.getElementById('bill').value);
      const type = document.getElementById('type').value;
      const mount = document.getElementById('mount').value;
      const roofType = document.getElementById('roofType')?.value;
      const power = parseFloat(document.getElementById('power').value);
      const battery = parseFloat(document.getElementById('battery').value);
      const turbine = document.getElementById('turbine').value;
      const margin = parseFloat(document.getElementById('margin').value) || 0;
      const fullBackup = document.getElementById('fullBackup').checked;
      const trenchLength = parseFloat(document.getElementById('trenchLength').value) || 0;

      if (!bill || !power) {
        document.getElementById('result').innerText = "Uzupełnij wszystkie pola.";
        return;
      }

      const suggestedPower = (bill * 0.0225).toFixed(2);

      const pvPrice = power * 2500;
      
      // Ceny magazynu wg podanych wartości
      const batteryPrices = {
        0: 0,
        5: 5000,
        10: 8000,
        12: 9000,
        14: 10000,
        16: 11000,
        24: 15000
      };
      const batteryPrice = batteryPrices[battery] || 0;

      const turbinePrice = turbine === "3" ? 12000 : turbine === "6" ? 24000 : 0;
      const backupPrice = fullBackup ? 1500 : 0;
      const trenchPrice = trenchLength * 30;
      const startPrice = 3000;

      const total = pvPrice + batteryPrice + turbinePrice + backupPrice + trenchPrice + startPrice;
      const finalPrice = total + margin; // rabat dodawany

      const backupText = fullBackup ? ' (pełny backup)' : '';

      document.getElementById('result').innerHTML = `
        <table>
          <tr><th colspan="2">Podsumowanie instalacji PV</th></tr>
          <tr><td>Rachunek miesięczny</td><td>${formatCurrency(bill)}</td></tr>
          <tr><td>Typ obiektu</td><td>${type}</td></tr>
          <tr><td>Montaż</td><td>${mount}${mount === 'dach' ? ', ' + roofType : ''}</td></tr>
          <tr><td>Przekop</td><td>${trenchLength > 0 ? trenchLength + ' m' : 'Brak'}</td></tr>
          <tr><td>Wybrana moc instalacji</td><td>${power} kW</td></tr>
          <tr><td>Sugerowana moc instalacji</td><td>${suggestedPower} kW</td></tr>
          <tr><td>Magazyn energii</td><td>${battery} kWh${backupText}</td></tr>
          <tr><th>Cena po rabacie</th><th>${formatCurrency(finalPrice)}</th></tr>
        </table>
      `;
    }

    toggleRoofType();
  </script>
</body>
</html>
